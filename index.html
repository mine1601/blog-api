<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon blog simple</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            font-weight: 300;
        }

        #articles {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .article {
            background: #1e293b;
            padding: 15px;
            width: 60%;
            border-radius: 10px;
            text-align: left;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
        }

        .content {
            margin-top: 5px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<h1>Mon blog simple</h1>

<div id="articles">Chargement...</div>

<script>
fetch("http://localhost:3000/articles")
.then(res => {
    if (!res.ok) {
        throw new Error("HTTP error " + res.status);
    }
    return res.json();
})
.then(data => {
    let container = document.getElementById("articles");
    container.innerHTML = "";

    data.forEach(a => {
        container.innerHTML += `
            <div class="article">
                <div class="title">${a.title}</div>
                <div class="content">${a.content}</div>
            </div>
        `;
    });
})
.catch(err => {
    console.error(err);
    document.getElementById("articles").innerHTML =
    "Erreur de chargement des articles";
});
</script>

</body>
</html>
